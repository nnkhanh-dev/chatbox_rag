<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Ingest Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-file-import text-blue-600"></i>
                Document Ingestion Test
            </h1>
            <p class="text-gray-600">Test upload, ingest text, and view logs</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Left Column: Upload & Text Input -->
            <div class="space-y-6">
                <!-- Upload File Form -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-upload text-blue-500 mr-2"></i>
                        Upload Document
                    </h2>
                    
                    <form id="uploadForm" class="space-y-4">
                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-400 transition-colors">
                            <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.txt,.xlsx">
                            <label for="fileInput" class="cursor-pointer">
                                <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-3"></i>
                                <p class="text-gray-600 font-medium">Click to select file</p>
                                <p class="text-sm text-gray-400 mt-1">PDF, DOCX, TXT, XLSX (max 50MB)</p>
                            </label>
                            <div id="selectedFile" class="mt-4 hidden">
                                <div class="inline-block bg-blue-50 px-4 py-2 rounded-full">
                                    <i class="fas fa-file text-blue-600 mr-2"></i>
                                    <span id="fileName" class="text-blue-600 font-medium"></span>
                                    <button type="button" id="removeFile" class="ml-2 text-red-500 hover:text-red-700">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" id="uploadBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                            <i class="fas fa-upload mr-2"></i>
                            Upload Document
                        </button>
                    </form>

                    <div id="uploadResult" class="mt-4 hidden"></div>
                </div>

                <!-- Text Input Form -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4 flex items-center">
                        <i class="fas fa-keyboard text-green-500 mr-2"></i>
                        Ingest Text
                    </h2>
                    
                    <form id="textForm" class="space-y-4">
                        <div>
                            <label for="textContent" class="block text-sm font-medium text-gray-700 mb-2">
                                Enter text content
                            </label>
                            <textarea 
                                id="textContent" 
                                rows="8" 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent resize-none"
                                placeholder="Paste your text here...&#10;&#10;Example:&#10;5Sao là ứng dụng dân sinh số 1 Việt Nam. Chúng tôi cung cấp các dịch vụ tiện ích như đặt xe, gọi đồ ăn, và nhiều hơn nữa."
                            ></textarea>
                            <p class="text-sm text-gray-500 mt-1">
                                Characters: <span id="charCount">0</span>
                            </p>
                        </div>
                        
                        <button type="submit" id="textBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                            <i class="fas fa-paper-plane mr-2"></i>
                            Submit Text
                        </button>
                    </form>

                    <div id="textResult" class="mt-4 hidden"></div>
                </div>
            </div>

            <!-- Right Column: Logs -->
            <div class="space-y-6">
                <!-- Ingest Logs -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-2xl font-semibold text-gray-800 flex items-center">
                            <i class="fas fa-list-ul text-purple-500 mr-2"></i>
                            Ingest Logs
                        </h2>
                    </div>

                    <!-- Filters -->
                    <div class="mb-4 flex gap-3">
                        <select id="typeFilter" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <option value="">All Types</option>
                            <option value="pdf">PDF</option>
                            <option value="docx">DOCX</option>
                            <option value="txt">TXT</option>
                            <option value="xlsx">XLSX</option>
                            <option value="text">Text</option>
                            <option value="url">URL</option>
                        </select>
                        <select id="limitFilter" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <option value="10">10 items</option>
                            <option value="20">20 items</option>
                            <option value="50">50 items</option>
                        </select>
                    </div>

                    <!-- Logs Container -->
                    <div id="logsContainer" class="space-y-3 max-h-[600px] overflow-y-auto">
                        <div class="text-center py-8 text-gray-400">
                            <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                            <p>Loading logs...</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div id="pagination" class="mt-4 flex items-center justify-between border-t pt-4">
                        <button id="prevPage" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-chevron-left mr-2"></i>
                            Previous
                        </button>
                        <span id="pageInfo" class="text-gray-600 font-medium"></span>
                        <button id="nextPage" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed">
                            Next
                            <i class="fas fa-chevron-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 hidden">
        <div class="bg-white rounded-lg shadow-lg p-4 max-w-sm border-l-4">
            <div class="flex items-start">
                <i id="toastIcon" class="text-2xl mr-3"></i>
                <div class="flex-1">
                    <p id="toastTitle" class="font-semibold"></p>
                    <p id="toastMessage" class="text-sm text-gray-600 mt-1"></p>
                </div>
                <button id="toastClose" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api/ingest';
        let currentPage = 1;
        let currentLimit = 10;
        let currentType = '';

        // Toast notification
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastTitle = document.getElementById('toastTitle');
            const toastMessage = document.getElementById('toastMessage');
            const toastBorder = toast.querySelector('.border-l-4');

            const types = {
                success: { icon: 'fas fa-check-circle text-green-500', border: 'border-green-500' },
                error: { icon: 'fas fa-exclamation-circle text-red-500', border: 'border-red-500' },
                info: { icon: 'fas fa-info-circle text-blue-500', border: 'border-blue-500' },
                warning: { icon: 'fas fa-exclamation-triangle text-yellow-500', border: 'border-yellow-500' }
            };

            toastIcon.className = types[type].icon;
            toastBorder.className = `bg-white rounded-lg shadow-lg p-4 max-w-sm border-l-4 ${types[type].border}`;
            toastTitle.textContent = title;
            toastMessage.textContent = message;

            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 5000);
        }

        document.getElementById('toastClose').addEventListener('click', () => {
            document.getElementById('toast').classList.add('hidden');
        });

        // File upload handling
        const fileInput = document.getElementById('fileInput');
        const selectedFile = document.getElementById('selectedFile');
        const fileName = document.getElementById('fileName');
        const removeFile = document.getElementById('removeFile');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                fileName.textContent = file.name;
                selectedFile.classList.remove('hidden');
                document.querySelector('label[for="fileInput"]').classList.add('hidden');
            }
        });

        removeFile.addEventListener('click', () => {
            fileInput.value = '';
            selectedFile.classList.add('hidden');
            document.querySelector('label[for="fileInput"]').classList.remove('hidden');
        });

        // Upload form
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) {
                showToast('Error', 'Please select a file', 'error');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            const originalText = uploadBtn.innerHTML;
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Uploading...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showToast('Success', 'File uploaded successfully! Processing in background.', 'success');
                    document.getElementById('uploadResult').innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <p class="text-green-800 font-medium">✓ Upload successful</p>
                            <p class="text-sm text-green-600 mt-1">Ingest Log ID: ${result.data.ingestLogId}</p>
                            <p class="text-sm text-green-600">Status: ${result.data.status}</p>
                        </div>
                    `;
                    document.getElementById('uploadResult').classList.remove('hidden');
                    
                    // Reset form
                    fileInput.value = '';
                    selectedFile.classList.add('hidden');
                    document.querySelector('label[for="fileInput"]').classList.remove('hidden');
                    
                    // Refresh logs
                    setTimeout(() => loadLogs(), 1000);
                } else {
                    showToast('Error', result.message || 'Upload failed', 'error');
                    document.getElementById('uploadResult').innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-red-800 font-medium">✗ Upload failed</p>
                            <p class="text-sm text-red-600 mt-1">${result.message}</p>
                        </div>
                    `;
                    document.getElementById('uploadResult').classList.remove('hidden');
                }
            } catch (error) {
                showToast('Error', error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = originalText;
            }
        });

        // Text content character count
        const textContent = document.getElementById('textContent');
        const charCount = document.getElementById('charCount');

        textContent.addEventListener('input', () => {
            charCount.textContent = textContent.value.length;
        });

        // Text form
        document.getElementById('textForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const content = textContent.value.trim();
            if (!content) {
                showToast('Error', 'Please enter text content', 'error');
                return;
            }

            const textBtn = document.getElementById('textBtn');
            const originalText = textBtn.innerHTML;
            textBtn.disabled = true;
            textBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Submitting...';

            try {
                const response = await fetch(`${API_BASE}/text`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content })
                });

                const result = await response.json();

                if (response.ok) {
                    showToast('Success', 'Text submitted successfully! Processing in background.', 'success');
                    document.getElementById('textResult').innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <p class="text-green-800 font-medium">✓ Text submitted</p>
                            <p class="text-sm text-green-600 mt-1">Ingest Log ID: ${result.data.ingestLogId}</p>
                            <p class="text-sm text-green-600">Status: ${result.data.status}</p>
                            <p class="text-sm text-green-600">Length: ${result.data.contentLength} characters</p>
                        </div>
                    `;
                    document.getElementById('textResult').classList.remove('hidden');
                    
                    // Reset form
                    textContent.value = '';
                    charCount.textContent = '0';
                    
                    // Refresh logs
                    setTimeout(() => loadLogs(), 1000);
                } else {
                    showToast('Error', result.message || 'Submission failed', 'error');
                    document.getElementById('textResult').innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-red-800 font-medium">✗ Submission failed</p>
                            <p class="text-sm text-red-600 mt-1">${result.message}</p>
                        </div>
                    `;
                    document.getElementById('textResult').classList.remove('hidden');
                }
            } catch (error) {
                showToast('Error', error.message, 'error');
            } finally {
                textBtn.disabled = false;
                textBtn.innerHTML = originalText;
            }
        });

        // Load logs
        async function loadLogs() {
            const logsContainer = document.getElementById('logsContainer');
            logsContainer.innerHTML = '<div class="text-center py-8 text-gray-400"><i class="fas fa-spinner fa-spin text-3xl mb-2"></i><p>Loading logs...</p></div>';

            try {
                const skip = (currentPage - 1) * currentLimit;
                const params = new URLSearchParams({
                    skip,
                    limit: currentLimit
                });
                
                if (currentType) {
                    params.append('type', currentType);
                }

                const response = await fetch(`${API_BASE}/logs?${params}`);
                const result = await response.json();

                if (response.ok && result.data) {
                    if (result.data.length === 0) {
                        logsContainer.innerHTML = `
                            <div class="text-center py-8 text-gray-400">
                                <i class="fas fa-inbox text-5xl mb-3"></i>
                                <p>No logs found</p>
                            </div>
                        `;
                    } else {
                        logsContainer.innerHTML = result.data.map(log => {
                            const statusColors = {
                                pending: 'bg-yellow-100 text-yellow-800',
                                processing: 'bg-blue-100 text-blue-800',
                                completed: 'bg-green-100 text-green-800',
                                failed: 'bg-red-100 text-red-800'
                            };

                            const typeIcons = {
                                pdf: 'fa-file-pdf text-red-500',
                                docx: 'fa-file-word text-blue-500',
                                txt: 'fa-file-alt text-gray-500',
                                xlsx: 'fa-file-excel text-green-500',
                                text: 'fa-keyboard text-purple-500',
                                url: 'fa-link text-blue-500'
                            };

                            return `
                                <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                                    <div class="flex items-start justify-between mb-2">
                                        <div class="flex items-center">
                                            <i class="fas ${typeIcons[log.documentType] || 'fa-file'} text-xl mr-3"></i>
                                            <div>
                                                <p class="font-medium text-gray-800">${log.documentType.toUpperCase()}</p>
                                                <p class="text-xs text-gray-500">${new Date(log.ingestedAt).toLocaleString()}</p>
                                            </div>
                                        </div>
                                        <span class="px-3 py-1 rounded-full text-xs font-medium ${statusColors[log.status]}">${log.status}</span>
                                    </div>
                                    <div class="text-sm text-gray-600 space-y-1">
                                        <p><strong>By:</strong> ${log.ingestedBy}</p>
                                        ${log.totalChunks ? `<p><strong>Chunks:</strong> ${log.successChunks}/${log.totalChunks}</p>` : ''}
                                        ${log.detailsMessage ? `<p class="text-xs mt-2 text-gray-500">${log.detailsMessage}</p>` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }

                    // Update pagination
                    updatePagination(result.pagination);
                } else {
                    logsContainer.innerHTML = `
                        <div class="text-center py-8 text-red-400">
                            <i class="fas fa-exclamation-circle text-3xl mb-2"></i>
                            <p>Failed to load logs</p>
                        </div>
                    `;
                }
            } catch (error) {
                logsContainer.innerHTML = `
                    <div class="text-center py-8 text-red-400">
                        <i class="fas fa-exclamation-circle text-3xl mb-2"></i>
                        <p>Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        function updatePagination(pagination) {
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');

            pageInfo.textContent = `Page ${pagination.currentPage} of ${pagination.pages} (${pagination.total} total)`;
            prevBtn.disabled = pagination.currentPage === 1;
            nextBtn.disabled = pagination.currentPage === pagination.pages;
        }

        // Pagination buttons
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                loadLogs();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            currentPage++;
            loadLogs();
        });

        // Filters
        document.getElementById('typeFilter').addEventListener('change', (e) => {
            currentType = e.target.value;
            currentPage = 1;
            loadLogs();
        });

        document.getElementById('limitFilter').addEventListener('change', (e) => {
            currentLimit = parseInt(e.target.value);
            currentPage = 1;
            loadLogs();
        });

        // Initial load
        loadLogs();
    </script>
</body>
</html>
